services:
  # NestJS Backend Web Service
  - type: web
    name: roxstar-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Prompts the user to input their existing database connection string
      - key: FRONTEND_URL
        value: "*"
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: "22" # Tells Render to use Node 22 (matching local development)
